<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-key="page.title">RDM — тест направления движения точек</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="i18n.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__row">
        <div class="header__titles">
          <h1>Random Dot Motion (RDM)</h1>
          <p class="subtitle" data-i18n="header.subtitle"></p>
        </div>
        <button type="button" id="btn-lang" class="btn btn-lang" title="">EN</button>
      </div>
    </header>

    <nav class="app-nav" id="app-nav" data-i18n="nav.aria" data-i18n-attr="aria-label">
      <ul class="app-nav__list">
        <li>
          <button type="button" class="nav-btn nav-btn--active" id="nav-main" data-i18n="nav.main"></button>
        </li>
        <li>
          <button type="button" class="nav-btn" id="nav-params" data-i18n="nav.params"></button>
        </li>
      </ul>
    </nav>

    <section id="screen-start" class="panel screen">
      <div id="start-panel-home">
        <article class="home-content">
          <section class="home-section">
            <h2 class="home-heading" data-i18n="home.whatTitle"></h2>
            <p data-i18n="home.whatP1"></p>
            <p data-i18n="home.whatP2"></p>
            <p data-i18n="home.whatP3"></p>
          </section>

          <section class="home-section">
            <h2 class="home-heading" data-i18n="home.whyTitle"></h2>
            <p data-i18n="home.whyLead"></p>
            <ul class="home-list">
              <li data-i18n="home.whyLi1"></li>
              <li data-i18n="home.whyLi2"></li>
              <li data-i18n="home.whyLi3"></li>
              <li data-i18n="home.whyLi4"></li>
            </ul>
            <p data-i18n="home.whyP2"></p>
          </section>

          <section class="home-section">
            <h2 class="home-heading" data-i18n="home.howTitle"></h2>
            <ol class="home-steps">
              <li data-i18n="home.how1"></li>
              <li data-i18n="home.how2"></li>
              <li>
                <span data-i18n="home.how3lead"></span>
                <ul class="home-list home-list--nested">
                  <li data-i18n="home.how3a"></li>
                  <li data-i18n="home.how3b"></li>
                </ul>
              </li>
              <li data-i18n="home.how4"></li>
              <li data-i18n="home.how5"></li>
            </ol>
          </section>

          <p class="home-tip" data-i18n="home.tip"></p>

          <div class="actions">
            <button type="button" id="btn-start" class="btn primary" data-i18n="btn.start"></button>
          </div>
        </article>
      </div>

      <div id="start-panel-params" class="hidden">
        <p class="params-lead" data-i18n="params.lead"></p>
        <fieldset class="settings">
          <legend data-i18n="params.legend"></legend>
          <div class="grid">
            <label><span data-i18n="cfg.numPoints"></span> <input type="number" id="cfg-numPoints" min="10" max="500" /></label>
            <label><span data-i18n="cfg.areaWidth"></span> <input type="number" id="cfg-areaWidth" min="200" max="1200" /></label>
            <label><span data-i18n="cfg.areaHeight"></span> <input type="number" id="cfg-areaHeight" min="200" max="800" /></label>
            <label><span data-i18n="cfg.dotSpeed"></span> <input type="number" id="cfg-dotSpeed" min="10" max="500" step="5" /></label>
            <label><span data-i18n="cfg.dotSize"></span> <input type="number" id="cfg-dotSize" min="0.5" max="6" step="0.5" /></label>
            <label><span data-i18n="cfg.trialDurationMs"></span> <input type="number" id="cfg-trialDurationMs" min="200" max="10000" step="50" /></label>
            <label><span data-i18n="cfg.fixationMs"></span> <input type="number" id="cfg-fixationMs" min="100" max="2000" step="50" /></label>
            <label><span data-i18n="cfg.repsPerLevel"></span> <input type="number" id="cfg-repsPerLevel" min="1" max="50" /></label>
            <label><span data-i18n="cfg.practiceTrials"></span> <input type="number" id="cfg-practiceTrials" min="0" max="30" /></label>
          </div>
          <label class="full">
            <span data-i18n="cfg.coherenceLevels"></span>
            <input type="text" id="cfg-coherenceLevels" placeholder="50, 30, 20, 10" />
          </label>
        </fieldset>
      </div>
    </section>

    <section id="screen-run" class="panel screen hidden">
      <div class="run-bar">
        <span id="run-label" data-i18n="run.label"></span>
        <span id="run-progress" data-i18n="run.progressInit"></span>
      </div>
      <div class="canvas-wrap">
        <canvas id="rdm-canvas" width="600" height="400" data-i18n="canvas.aria" data-i18n-attr="aria-label"></canvas>
      </div>
      <p id="run-hint" class="run-hint" data-i18n="run.hint"></p>
      <div class="actions">
        <button type="button" id="btn-abort" class="btn ghost" data-i18n="run.abort"></button>
      </div>
    </section>

    <section id="screen-results" class="panel screen hidden results-screen">
      <h2 class="results-title" data-i18n="results.title"></h2>
      <p id="results-meta" class="results-meta"></p>

      <div id="results-interpret" class="results-interpret"></div>

      <p id="threshold-line" class="threshold-line" aria-live="polite"></p>

      <div id="metric-cards" class="metric-cards"></div>

      <div class="chart-block">
        <h3 class="block-heading" data-i18n="chart.title"></h3>
        <p class="block-hint" data-i18n="chart.hint"></p>
        <div class="chart-wrap">
          <p id="chart-error" class="chart-fallback hidden" role="status"></p>
          <canvas id="chart-accuracy" height="220" data-i18n="chart.aria" data-i18n-attr="aria-label"></canvas>
        </div>
      </div>

      <div class="coh-table-block">
        <h3 class="block-heading" data-i18n="table.summary.title"></h3>
        <div class="table-wrap table-wrap--coh">
          <table class="results-table results-table--coh" id="table-by-coherence">
            <thead>
              <tr>
                <th data-i18n="table.summary.coh"></th>
                <th data-i18n="table.summary.n"></th>
                <th data-i18n="table.summary.acc"></th>
                <th data-i18n="table.summary.rt"></th>
              </tr>
            </thead>
            <tbody id="coh-table-body"></tbody>
          </table>
        </div>
      </div>

      <div id="explain-block" class="explain-block"></div>

      <details class="details-trials">
        <summary data-i18n="details.trials"></summary>
        <div class="table-wrap">
          <table class="results-table">
            <thead>
              <tr>
                <th data-i18n="table.trials.hash"></th>
                <th data-i18n="table.trials.coh"></th>
                <th data-i18n="table.trials.dir"></th>
                <th data-i18n="table.trials.ans"></th>
                <th data-i18n="table.trials.out"></th>
                <th data-i18n="table.trials.rt"></th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </details>

      <div class="actions actions--results">
        <button type="button" id="btn-csv" class="btn" data-i18n="btn.csv"></button>
        <button type="button" id="btn-repeat" class="btn primary" data-i18n="btn.repeat"></button>
      </div>
    </section>
  </div>
</body>
</html>
